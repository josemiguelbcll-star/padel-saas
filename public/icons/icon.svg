<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Fondo marino con esquinas redondeadas (estilo iOS/Android) -->
  <rect width="512" height="512" rx="112" fill="#0B1F4D"/>

  <!-- ── Isotipo MatchGo ────────────────────────────────────────────── -->

  <!-- M estilizada: dos picos, trazo grueso blanco -->
  <!-- Coordenadas: arranca abajo izq → pico izq → valle → pico der → abajo der -->
  <path
    d="M 78 415 L 145 98 L 256 218 L 367 98 L 434 415"
    fill="none"
    stroke="white"
    stroke-width="60"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Pelota de pádel (lima) — se superpone al pico derecho de la M -->
  <circle cx="376" cy="108" r="86" fill="#D9F23B"/>

  <!-- Costura de la pelota (trazo marino sobre la lima) -->
  <path
    d="M 348 82 Q 376 108 348 134"
    fill="none" stroke="#0B1F4D" stroke-width="7.5" stroke-linecap="round"
  />
  <path
    d="M 404 82 Q 376 108 404 134"
    fill="none" stroke="#0B1F4D" stroke-width="7.5" stroke-linecap="round"
  />

  <!-- Chevron verde (velocidad / acción) — debajo de la M, lado izquierdo -->
  <path d="M 92 310 L 112 326 L 92 342" fill="none" stroke="#39C54A" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
  <path d="M 112 310 L 134 326 L 112 342" fill="none" stroke="#39C54A" stroke-width="11" stroke-linecap="round" stroke-linejoin="round" opacity="0.75"/>
  <path d="M 134 310 L 158 326 L 134 342" fill="none" stroke="#39C54A" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
