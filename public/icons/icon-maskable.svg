<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!--
    Maskable icon para Android adaptive icons.
    Safe zone = círculo interno de 80% (radio 205px desde el centro 256,256).
    Todo el contenido importante dentro de ese círculo.
    Fondo llena TODO el cuadrado (sin rx).
  -->
  <rect width="512" height="512" fill="#0B1F4D"/>

  <!-- M estilizada (un poco más pequeña para safe zone) -->
